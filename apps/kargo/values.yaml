kargo:
  api:
    host: kargo.lucyscrib.com

    secret:
      name: admin-creds

    argocd:
      urls:
        "": https://argocd.lucyscrib.com

    # TODO
    resources:
      {}
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      # requests:
      #   cpu: 100m
      #   memory: 128Mi

    tls:
      enabled: false
      terminatedUpstream: true

    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: lucys-crib-acme
      tls:
        selfSignedCert: false

  controller:
    reconcilers:
      warehouses:
        minReconciliationInterval: 30m

external-secrets:
  onepassword:
    secrets:
      admin-creds:
        enabled: true
        keys:
          ADMIN_ACCOUNT_PASSWORD_HASH:
            item: kargo-admin-creds
            field: ADMIN_ACCOUNT_PASSWORD_HASH
          ADMIN_ACCOUNT_TOKEN_SIGNING_KEY:
            item: kargo-admin-creds
            field: ADMIN_ACCOUNT_TOKEN_SIGNING_KEY
